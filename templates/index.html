<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- Auth Screen -->
<div class="auth-wrapper" id="authScreen">
    <div class="auth-box">
        <h2 id="authTitle">Login</h2>
        <input type="text" id="authUsername" placeholder="Username" />
        <input type="password" id="authPassword" placeholder="Password" />
        <button onclick="submitAuth()">Submit</button>
        <p class="auth-switch">
            <span id="authSwitchText">Don't have an account?</span>
            <a href="#" onclick="toggleAuth()"> <span id="authSwitchLink">Register</span></a>
        </p>
        <p class="auth-error" id="authError"></p>
    </div>
</div>

<!-- Chat Screen -->
<div class="container" id="chatScreen" style="display:none">
    <div class="header">
        Order Chatbot
        <span id="headerUser"></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="messages" id="messages">
        <div class="msg bot">Hello! Here is what I can do:
            - status of order 123
            - cancel order 123
            - show all orders
            - or ask me anything!</div>
    </div>

    <div class="hints">
        Try: "status of order 123" · "cancel order 456" · "show all orders"
    </div>

    <div class="input-area">
        <input type="text" id="input" placeholder="Type a message..."/>
        <button id="sendBtn" onclick="send()">Send</button>
    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
